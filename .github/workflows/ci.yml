name: CI

# Runs on every push and on every pull request targeting main.
# Fails the PR if typecheck, lint, or build fail.
#
# Zero secrets needed — this workflow never touches the database
# or the deploy pipeline. Vercel does its own build on push to main
# (or on manual `npx vercel --prod`), which is its own thing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck + lint + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: yarit-shop/package-lock.json

      - name: Install deps
        working-directory: yarit-shop
        run: npm ci

      - name: Typecheck
        working-directory: yarit-shop
        run: npx tsc --noEmit

      - name: Lint
        working-directory: yarit-shop
        run: npm run lint

      # Guard against the 2026-04-11 SSG incident recurrence. Any
      # TWO-SEGMENT dynamic storefront route (e.g. [locale]/product/
      # [slug]) that returns `generateStaticParams` with only
      # `{ locale }` causes Next 16 to classify the route as `●` SSG
      # and then 500 at runtime when next-intl's `setRequestLocale`
      # calls `headers()` inside the static-generation context.
      # Either return full params (locale × slug/token/id) or omit
      # the function entirely — see `docs/CONVENTIONS.md` §
      # generateStaticParams and `docs/DECISIONS.md` ADR-018 for the
      # full rule + post-mortem.
      #
      # The guard specifically targets NESTED dynamic routes (paths
      # that contain a `[bracket]` segment AFTER the `[locale]`
      # segment). Single-segment routes like `/[locale]/about` or
      # `/[locale]/contact` are allowed to call
      # `routing.locales.map((locale) => ({ locale }))` because they
      # have no second dynamic segment to enumerate — for them it's
      # just "prerender one page per locale", which is valid.
      - name: Guard against partial generateStaticParams on nested dynamic routes
        working-directory: yarit-shop
        shell: bash
        run: |
          NESTED=$(find 'src/app/(storefront)/[locale]' -type f -name 'page.tsx' | while read f; do
            rel="${f#src/app/(storefront)/[locale]/}"
            # A nested dynamic route has at least one [bracket] in the
            # path tail after [locale]/.
            case "$rel" in
              *'['*) echo "$f" ;;
            esac
          done)
          FAILED=0
          for f in $NESTED; do
            if grep -qE 'routing\.locales\.map' "$f"; then
              echo "::error file=$f::Partial generateStaticParams on a nested dynamic route. See docs/CONVENTIONS.md §generateStaticParams + ADR-018."
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            exit 1
          fi
          echo "Guard OK: no nested dynamic routes have routing.locales.map"

      - name: Build
        working-directory: yarit-shop
        run: npm run build
        env:
          # Dummy secret so the production-like boot check passes.
          # NEVER reuse this string — it's only here so CI can run
          # `next build` which triggers Payload's config module to
          # load at collect-page-data time.
          PAYLOAD_SECRET: ci-dummy-secret-do-not-use-in-any-real-environment
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
